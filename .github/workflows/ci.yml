name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          # uvenv.zsh uses zsh-specific syntax (associative array indexing,
          # ${(@f)…} flag expansions) that shellcheck doesn't understand;
          # zsh -n in the smoke job covers syntax for that file.
          ignore_names: uvenv.zsh

  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # mise queries the GitHub API to resolve tool versions (e.g. uv).
      # Without a token it uses the strict unauthenticated rate limit, which
      # the macOS runner can blow through (esp. when shared with other repos).
      # GITHUB_TOKEN is auto-provided by Actions; mise picks it up.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install uv + python via mise
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          mise use -g uv@latest
          mise use -g python@3.13

      - name: Stage uvenv as if installed
        run: |
          STAGE="$HOME/.config/uvenv"
          mkdir -p "$STAGE"
          # Mirror what the release tarball produces: flat layout at $STAGE
          # built from src/ + install.sh (which lives at repo root).
          cp -r src/uvenv.sh src/VERSION src/lib src/completions "$STAGE/"
          cp install.sh "$STAGE/"
          ls -la "$STAGE"

          # Simulate what install.sh writes — needed so `uvenv doctor` can
          # verify the rc-integration check.
          touch "$HOME/.bashrc"
          echo "source $STAGE/uvenv.sh" >> "$HOME/.bashrc"

      - name: Smoke test the modular layout
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          # shellcheck disable=SC1091
          source "$HOME/.config/uvenv/uvenv.sh"

          uvenv version
          uvenv help
          uvenv info | head -5
          uvenv status
          uvenv doctor

          uvenv list

          # Flags-first grammar + -y skips the confirm prompt
          uvenv create --python=3.13 -y -n smoketest
          uvenv list
          uvenv activate smoketest
          uvenv status
          uvenv install -y requests
          python -c "import requests; print(requests.__version__)"
          uvenv freeze smoketest | head -5
          uvenv update --all || true
          uvenv deactivate

          # Regression: deactivate must unset VIRTUAL_ENV
          if [ -n "${VIRTUAL_ENV:-}" ]; then
            echo "REGRESSION: VIRTUAL_ENV still set after deactivate"; exit 1
          fi

          # Regression: deactivate works even when the venv's `deactivate`
          # function isn't defined (the original p10k-still-shows-venv bug).
          uvenv activate smoketest
          unset -f deactivate 2>/dev/null || true
          uvenv deactivate
          if [ -n "${VIRTUAL_ENV:-}" ]; then
            echo "REGRESSION: deactivate-without-function did not clear VIRTUAL_ENV"; exit 1
          fi
          echo "robust deactivate OK"

          # exec & freeze (without activating)
          uvenv exec smoketest -- python -c "import requests; print('exec ok')"
          uvenv freeze smoketest | grep -i requests

          # tool grammar — passthrough must NOT mash -U
          out=$(uvenv tool install -y nonexistent-pkg-xyz -U 2>&1 || true)
          if echo "$out" | grep -q "Failed to parse"; then
            echo "REGRESSION: -U mashed into pkg name"; exit 1
          fi

          # Regression: tool install --python=X.Y must land on X.Y, not
          # whatever mise's current python happens to be.
          mise use -g python@3.13
          uvenv tool --python=3.13 -y install ruff
          if ! grep -q '^version_info = 3.13' "$HOME/.local/share/uv/tools/ruff/pyvenv.cfg"; then
            echo "REGRESSION: tool --python=3.13 did not land on 3.13"
            cat "$HOME/.local/share/uv/tools/ruff/pyvenv.cfg"
            exit 1
          fi
          echo "tool --python honors version OK"
          uv tool uninstall ruff || true

          # Regression: inheriting $VIRTUAL_ENV in a child shell whose
          # $PATH was rebuilt (e.g. by mise) must still resolve `python`
          # to the venv. Without the v0.2.5 fix, this child shell would
          # have a venv name but `python` pointing at mise's.
          uvenv create -y -n childvenv
          uvenv activate childvenv
          venv_python_expected="$VIRTUAL_ENV/bin/python"
          # Simulate a child shell where mise rebuilt PATH without the venv
          out=$(bash -c '
              export VIRTUAL_ENV="'"$VIRTUAL_ENV"'"
              # Drop the venv bin from PATH to simulate mises rebuild
              export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              source "$HOME/.config/uvenv/uvenv.sh"
              which python
          ')
          if [ "$out" != "$venv_python_expected" ]; then
            echo "REGRESSION: child-shell PATH consistency broken"
            echo "  expected: $venv_python_expected"
            echo "  got:      $out"
            exit 1
          fi
          echo "child-shell PATH consistency OK"
          uvenv deactivate
          uvenv remove childvenv

          # Regression: stale $VIRTUAL_ENV pointing at a deleted venv
          # must be cleaned up when uvenv.sh is sourced.
          out=$(bash -c '
              export VIRTUAL_ENV="/tmp/definitely-does-not-exist-$RANDOM"
              source "$HOME/.config/uvenv/uvenv.sh"
              echo "VIRTUAL_ENV=[${VIRTUAL_ENV:-unset}]"
          ')
          if [ "$out" != "VIRTUAL_ENV=[unset]" ]; then
            echo "REGRESSION: stale VIRTUAL_ENV not cleaned up ($out)"; exit 1
          fi
          echo "stale VIRTUAL_ENV cleanup OK"

          # local venv
          uvenv create --python=3.13 -y -l ./localvenv
          uvenv activate ./localvenv
          uvenv deactivate
          uvenv remove ./localvenv

          uvenv remove smoketest

          uvenv completions bash | head -5
          uvenv completions zsh  | head -5
          echo "OK on ${{ matrix.os }}"

      - name: Install zsh
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y zsh

      - name: Regression — full lifecycle + flag passthrough under zsh
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Guards two zsh-specific bugs we've hit:
          #   1. `declare -F` (means "float var" in zsh) breaking lazy-load
          #   2. unquoted $pkg word-splitting (zsh doesn't, bash does) — fixed
          #      by the flags-first grammar with verbatim "$@" passthrough.
          eval "$($HOME/.local/bin/mise activate bash)"
          PATH_FOR_ZSH="$PATH"
          zsh -c "
            export PATH='$PATH_FOR_ZSH'
            source \"\$HOME/.config/uvenv/uvenv.sh\"
            uvenv --help    | head -3
            uvenv version
            uvenv info      | head -5
            uvenv doctor    >/dev/null
            uvenv create --python=3.13 -y -n zsmoke
            uvenv activate zsmoke
            uvenv install -y requests
            uvenv freeze zsmoke | grep -i requests
            uvenv deactivate
            if [ -n \"\${VIRTUAL_ENV:-}\" ]; then
              echo 'REGRESSION: zsh deactivate left VIRTUAL_ENV set'; exit 1
            fi

            # The original user bug: -U mashed into pkg name in zsh.
            out=\$(uvenv tool install -y nonexistent-pkg-xyz -U 2>&1 || true)
            if echo \"\$out\" | grep -q 'Failed to parse'; then
              echo 'REGRESSION: -U mashed in zsh'; exit 1
            fi
            echo 'zsh -U passthrough OK'

            uvenv remove zsmoke
            echo 'zsh regression OK'
          "
