name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'

  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install uv + python via mise
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          mise use -g uv@latest
          mise use -g python@3.13

      - name: Stage uvenv as if installed
        run: |
          STAGE="$HOME/.config/uvenv"
          mkdir -p "$STAGE"
          cp -r uvenv.sh install.sh VERSION lib completions "$STAGE/"
          ls -la "$STAGE"

      - name: Smoke test the modular layout
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          # shellcheck disable=SC1091
          source "$HOME/.config/uvenv/uvenv.sh"

          uvenv version
          uvenv help
          uvenv info | head -5
          uvenv status
          uvenv doctor

          uvenv list

          uvenv create -n smoketest
          uvenv list
          uvenv activate smoketest
          uvenv status
          uvenv install requests
          python -c "import requests; print(requests.__version__)"
          uvenv freeze smoketest | head -5
          uvenv update --all || true
          uvenv deactivate

          # exec & freeze (without activating)
          uvenv exec smoketest -- python -c "import requests; print('exec ok')"
          uvenv freeze smoketest | grep -i requests

          # local venv
          uvenv create -l ./localvenv
          uvenv activate ./localvenv
          uvenv deactivate
          uvenv remove ./localvenv

          uvenv remove smoketest

          uvenv completions bash | head -5
          uvenv completions zsh  | head -5
          echo "OK on ${{ matrix.os }}"
