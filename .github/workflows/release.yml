name: Release

# Push a tag like v0.2.0 to cut a release.
# Manual dispatch lets you re-cut a release from a tag that already exists.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanity-check repo
        run: |
          test -f uvenv.sh
          test -f install.sh
          test -f VERSION
          test -d lib
          test -d completions
          grep -q '^uvenv() {' uvenv.sh

          TAG="${{ steps.tag.outputs.name }}"
          BARE="${TAG#v}"
          VFILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$VFILE" != "$BARE" ]; then
            echo "::warning::VERSION file ($VFILE) does not match tag ($BARE)"
          fi

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
        continue-on-error: true

      - name: Build tarball
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          STAGE="uvenv-${TAG}"
          mkdir -p "$STAGE"
          cp -r uvenv.sh install.sh VERSION LICENSE lib completions "$STAGE/"
          [ -d docs ] && cp -r docs "$STAGE/"
          tar -czf "uvenv-${TAG}.tar.gz" "$STAGE"
          ls -lh "uvenv-${TAG}.tar.gz"
          tar -tzf "uvenv-${TAG}.tar.gz" | head -20

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "uvenv-${TAG}.tar.gz" \
            install.sh \
            LICENSE
