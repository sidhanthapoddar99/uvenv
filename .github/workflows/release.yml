name: Release

# Push a tag like v0.1.0 to cut a release.
# Manual dispatch lets you re-cut a release from a tag that already exists.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanity-check uvenv.sh
        run: |
          test -f uvenv.sh
          test -f install.sh
          # Must contain the function definition
          grep -q '^uvenv() {' uvenv.sh
          # Version line should match the tag (with or without 'v' prefix)
          TAG="${{ steps.tag.outputs.name }}"
          BARE="${TAG#v}"
          if ! grep -qE "^UVENV_VERSION=\"${BARE}\"" uvenv.sh; then
            echo "::warning::UVENV_VERSION in uvenv.sh does not match tag ${TAG}"
            echo "         Expected: UVENV_VERSION=\"${BARE}\""
            grep '^UVENV_VERSION=' uvenv.sh || true
          fi

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
        continue-on-error: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --generate-notes \
            uvenv.sh install.sh LICENSE
